name: Build and Deploy

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4.2.2

      - name: Set up Node.js
        uses: actions/setup-node@v4.2.0
        with:
          node-version: '22.x'

      - name: Install image optimization tools
        run: |
          sudo apt-get update
          sudo apt-get install -y optipng

      - name: Optimize PNGs in public/assets (lossless)
        run: |
          echo "Optimizing PNGs in public/assets (lossless with optipng)"
          find public/assets -type f -iname '*.png' -print0 | xargs -0 -n1 -P4 optipng -o7 -strip all || true

      - name: Install dependencies for CI
        run: npm ci

      - name: Run build
        run: npm run build

      - name: Upload build artifact
        uses: actions/upload-artifact@v4.6.1
        with:
          name: game-build
          path: dist/

  deploy:
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Download build artifact
        uses: actions/download-artifact@v4.1.9
        with:
          name: game-build
          path: dist/

      - name: Upload to itch.io
        uses: rthery/butler-publish-itchio-action@v1.1.1
        env:
          BUTLER_CREDENTIALS: ${{ secrets.BUTLER_CREDENTIALS }}
          CHANNEL: html5
          ITCH_GAME: ${{ github.event.repository.name }}
          ITCH_USER: ${{ vars.ITCH_USER }}
          PACKAGE: dist/
